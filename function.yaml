metadata:
  name: onion-weed-ultralytics
spec:
  description: YOLOv8 onion/weed detector for CVAT (Ultralytics)
  handler: yolo_nuctl_function:handler
  image: nuclio/nuclio-python:3.11-stretch-1.12.8
  kind: python

  minReplicas: 1
  maxReplicas: 5

  triggers:
    httpTrigger:
      maxWorkers: 2
      kind: http
      attributes:
        method: ["POST"]
        path: /

  environment:
    MODEL_PATH: "/models/best.pt"
    CONF_THRESHOLD: "0.25"
    IOU_THRESHOLD: "0.45"
    MAX_DET: "300"
    LOG_LEVEL: "INFO"

  volumes:
    - volume:
        name: model-data
        hostPath:
          path: /mnt/c/Users/Marek/Documents/runs/detect/train/weights
      volumeMount:
        name: model-data
        mountPath: /models