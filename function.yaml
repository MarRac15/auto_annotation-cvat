metadata:
  name: onion-weed-ultralytics
  namespace: cvat
  annotations:
    name: Onion/Weed Detector
    type: detector
    framework: pytorch
    spec: |
      [
        { "id": 0, "name": "Onion" },
        { "id": 1, "name": "Weed" }
      ]
spec:
  description: YOLOv8 onion/weed detector for CVAT
  runtime: 'python:3.10'
  handler: yolo_nuctl_function:handler
  kind: python

  build:
    baseImage: python:3.10-slim
    directives:
      preCopy:
        - kind: RUN
          value: apt-get update && apt-get install -y libgl1 libglib2.0-0 && rm -rf /var/lib/apt/lists/*
    commands:
      - pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - pip install --no-cache-dir ultralytics pillow
      - pip uninstall -y opencv-python
      - pip install --no-cache-dir opencv-python-headless

  minReplicas: 1
  maxReplicas: 5

  triggers:
    httpTrigger:
      maxWorkers: 2
      kind: http
      attributes:
        maxRequestBodySize: 33554432

  environment:
    MODEL_PATH: "/models/best.pt"
    CONF_THRESHOLD: "0.25"
    IOU_THRESHOLD: "0.45"
    MAX_DET: "300"
    LOG_LEVEL: "INFO"

  volumes:
    - volume:
        name: model-data
        hostPath:
          path: /home/mraczkowski/models/best.pt
      volumeMount:
        name: model-data
        mountPath: /models